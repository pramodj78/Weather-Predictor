<!DOCTYPE html>
<html>

<head>

    <title>Weather Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            background:#0f172a;

            color:white;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:20px;
        }

        .container{

            width:450px;

            background:#1e293b;

            padding:30px;

            border-radius:20px;

            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{

            text-align:center;

            margin-bottom:25px;

            color:#38bdf8;
        }

        input{

            width:100%;

            padding:14px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            outline:none;

            font-size:15px;
        }

        button{

            width:100%;

            padding:14px;

            margin-top:20px;

            border:none;

            border-radius:10px;

            background:#3b82f6;

            color:white;

            font-size:18px;

            cursor:pointer;
        }

        button:hover{

            background:#2563eb;
        }

        .range-box{

            margin-top:20px;

            padding:15px;

            border-radius:15px;

            background:#334155;

            font-size:14px;

            line-height:1.9;
        }

        .range-box h3{

            margin-bottom:10px;

            color:#38bdf8;
        }

        .result{

            margin-top:25px;

            text-align:center;

            background:#334155;

            padding:20px;

            border-radius:15px;
        }

        .result h2{

            color:#22c55e;

            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🌦 Weather Predictor</h1>

    <form method="POST">

        <input
        type="number"
        step="any"
        name="temp"
        placeholder="Temperature (°C)"
        required>

        <input
        type="number"
        step="any"
        name="humidity"
        placeholder="Humidity (%)"
        required>

        <input
        type="number"
        step="any"
        name="wind"
        placeholder="Wind Speed (km/h)"
        required>

        <input
        type="number"
        step="any"
        name="visibility"
        placeholder="Visibility (km)"
        required>

        <input
        type="number"
        step="any"
        name="pressure"
        placeholder="Pressure (kPa)"
        required>

        <div class="range-box">

            <h3>Input Ranges</h3>

            <p>🌡 Temperature : -20 to 50 °C</p>

            <p>💧 Humidity : 0 to 100 %</p>

            <p>🌪 Wind Speed : 0 to 150 km/h</p>

            <p>👁 Visibility : 0 to 20 km</p>

            <p>📊 Pressure : 80 to 110 kPa</p>

        </div>

        <button type="submit">

            Predict Weather

        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h3>Predicted Weather</h3>

        <h2>{{ prediction }}</h2>

    </div>

    {% endif %}

</div>

</body>

</html>
